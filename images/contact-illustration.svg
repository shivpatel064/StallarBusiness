  <rect x="160" y="410" width="280" height="44" rx="22" fill="#1E6FFF"/>
  <text x="300" y="437" font-family="Arial" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Respond within 24 hours ✓</text>
