  <rect x="78" y="158" width="55" height="5" rx="2.5" fill="#5A6A8A"/>
  <circle cx="162" cy="143" r="6" fill="#27C840"/>
  <rect x="420" y="200" width="150" height="55" rx="14" fill="white"/>
  <circle cx="445" cy="227" r="16" fill="#00D4FF"/>
  <text x="445" y="232" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">📞</text>
  <rect x="468" y="215" width="80" height="7" rx="3.5" fill="#1A2540"/>
  <rect x="468" y="228" width="60" height="5" rx="2.5" fill="#5A6A8A"/>
  <rect x="30" y="310" width="150" height="55" rx="14" fill="white"/>
  <circle cx="55" cy="337" r="16" fill="#1E6FFF" opacity="0.8"/>
  <text x="55" y="342" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">⏱</text>
  <rect x="78" y="325" width="80" height="7" rx="3.5" fill="#1A2540"/>
  <rect x="78" y="338" width="95" height="5" rx="2.5" fill="#5A6A8A"/>
