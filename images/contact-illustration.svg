      <stop offset="0%" stop-color="#0A1628"/><stop offset="100%" stop-color="#0d1e3d"/>
    </linearGradient>
    <linearGradient id="bl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E6FFF"/><stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="480" fill="url(#bg)"/>
