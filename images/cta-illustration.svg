<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/><stop offset="100%" stop-color="#112040"/>
    </linearGradient>
    <linearGradient id="bl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E6FFF"/><stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="150" cy="80" r="1" fill="white" opacity="0.4"/>
  <circle cx="250" cy="30" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="550" cy="50" r="1" fill="white" opacity="0.6"/>
  <circle cx="650" cy="25" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="750" cy="70" r="1" fill="white" opacity="0.5"/>
  <circle cx="700" cy="200" r="1" fill="white" opacity="0.3"/>
  <circle cx="100" cy="200" r="1.5" fill="white" opacity="0.3"/>
  <!-- Glow behind rocket -->
  <ellipse cx="400" cy="180" rx="120" ry="80" fill="#1E6FFF" opacity="0.12"/>
  <!-- Rocket body -->
  <ellipse cx="400" cy="120" rx="30" ry="60" fill="url(#bl)"/>
  <polygon points="400,52 372,100 428,100" fill="#4D8FFF"/>
  <!-- Window -->
  <circle cx="400" cy="115" r="12" fill="#0A1628" stroke="#00D4FF" stroke-width="2"/>
  <circle cx="400" cy="115" r="6" fill="#00D4FF" opacity="0.5"/>
  <!-- Fins -->
  <polygon points="370,150 355,190 385,160" fill="#1E6FFF"/>
  <polygon points="430,150 445,190 415,160" fill="#1E6FFF"/>
  <!-- Exhaust -->
  <ellipse cx="400" cy="185" rx="18" ry="10" fill="#FFB800" opacity="0.9"/>
  <ellipse cx="400" cy="195" rx="12" ry="20" fill="#FF6B35" opacity="0.7"/>
  <ellipse cx="400" cy="210" rx="7" ry="25" fill="#FFB800" opacity="0.4"/>
  <!-- Orbit rings -->
  <ellipse cx="400" cy="150" rx="80" ry="20" fill="none" stroke="#1E6FFF" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <ellipse cx="400" cy="150" rx="120" ry="30" fill="none" stroke="#00D4FF" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.2"/>
  <!-- Stars/sparks near rocket -->
  <circle cx="340" cy="90" r="2" fill="#FFB800" opacity="0.8"/>
  <circle cx="460" cy="80" r="2" fill="#00D4FF" opacity="0.7"/>
  <circle cx="330" cy="140" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="470" cy="130" r="1.5" fill="white" opacity="0.5"/>
</svg>