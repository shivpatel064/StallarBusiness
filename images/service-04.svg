<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081228"/><stop offset="100%" stop-color="#0d1e3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E6FFF"/><stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.08" stroke="#1E6FFF" stroke-width="1">
    <line x1="0" y1="60" x2="600" y2="60"/><line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/><line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="60" y1="0" x2="60" y2="380"/><line x1="120" y1="0" x2="120" y2="380"/>
    <line x1="180" y1="0" x2="180" y2="380"/><line x1="240" y1="0" x2="240" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/><line x1="360" y1="0" x2="360" y2="380"/>
    <line x1="420" y1="0" x2="420" y2="380"/><line x1="480" y1="0" x2="480" y2="380"/>
    <line x1="540" y1="0" x2="540" y2="380"/>
  </g>
  <!-- Accent glow -->
  <ellipse cx="300" cy="190" rx="200" ry="160" fill="#00D4FF" opacity="0.15"/>
  <!-- Central icon circle -->
  <circle cx="300" cy="160" r="80" fill="rgba(30,111,255,0.12)" stroke="#1E6FFF" stroke-width="1"/>
  <circle cx="300" cy="160" r="60" fill="rgba(30,111,255,0.15)" stroke="#1E6FFF" stroke-width="0.5"/>
  
  <!-- Nodes -->
  <circle cx="300" cy="160" r="20" fill="#1E6FFF"/>
  <circle cx="240" cy="120" r="14" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="2"/>
  <circle cx="360" cy="120" r="14" fill="#0d1e3d" stroke="#00D4FF" stroke-width="2"/>
  <circle cx="240" cy="200" r="14" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="2"/>
  <circle cx="360" cy="200" r="14" fill="#0d1e3d" stroke="#00D4FF" stroke-width="2"/>
  <circle cx="190" cy="160" r="10" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="1.5"/>
  <circle cx="410" cy="160" r="10" fill="#0d1e3d" stroke="#00D4FF" stroke-width="1.5"/>
  <!-- Lines -->
  <line x1="300" y1="160" x2="240" y2="120" stroke="url(#accent)" stroke-width="1.5"/>
  <line x1="300" y1="160" x2="360" y2="120" stroke="url(#accent)" stroke-width="1.5"/>
  <line x1="300" y1="160" x2="240" y2="200" stroke="url(#accent)" stroke-width="1.5"/>
  <line x1="300" y1="160" x2="360" y2="200" stroke="url(#accent)" stroke-width="1.5"/>
  <line x1="240" y1="120" x2="190" y2="160" stroke="#1E6FFF" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="120" x2="410" y2="160" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="200" x2="190" y2="160" stroke="#1E6FFF" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="200" x2="410" y2="160" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <!-- Center icon -->
  <text x="300" y="166" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SF</text>

  <!-- Label -->
  <rect x="180" y="268" width="240" height="36" rx="18" fill="url(#accent)"/>
  <text x="300" y="291" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">System Integration</text>
  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="4" fill="#1E6FFF" opacity="0.5"/>
  <circle cx="520" cy="80" r="4" fill="#00D4FF" opacity="0.5"/>
  <circle cx="80" cy="300" r="4" fill="#00D4FF" opacity="0.5"/>
  <circle cx="520" cy="300" r="4" fill="#1E6FFF" opacity="0.5"/>
</svg>