  <line x1="400" y1="220" x2="600" y2="220" stroke="url(#bl)" stroke-width="1.5" opacity="0.4" stroke-dasharray="6 4"/>
  <line x1="200" y1="220" x2="310" y2="380" stroke="url(#bl)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 4"/>
  <line x1="600" y1="220" x2="490" y2="380" stroke="url(#bl)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 4"/>
  <line x1="400" y1="220" x2="400" y2="380" stroke="url(#bl)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 4"/>
  <!-- Person 1 (left) -->
  <circle cx="200" cy="175" r="55" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="1.5"/>
