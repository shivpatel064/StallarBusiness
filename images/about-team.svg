  <rect x="145" y="268" width="50" height="5" rx="2.5" fill="#5A6A8A"/>
  <rect x="145" y="281" width="90" height="5" rx="2.5" fill="#1E6FFF" opacity="0.7"/>
  <circle cx="243" cy="258" r="8" fill="#27C840" opacity="0.9"/>
