  <rect x="320" y="245" width="160" height="80" rx="12" fill="#112040" stroke="#1E6FFF" stroke-width="1.5"/>
  <rect x="336" y="260" width="85" height="7" rx="3.5" fill="white" opacity="0.9"/>
  <rect x="336" y="273" width="60" height="5" rx="2.5" fill="#5A6A8A"/>
  <rect x="336" y="286" width="100" height="5" rx="2.5" fill="url(#bl)" opacity="0.9"/>
  <rect x="336" y="299" width="75" height="5" rx="2.5" fill="#5A6A8A"/>
  <circle cx="456" cy="263" r="9" fill="#1E6FFF"/>
  <rect x="452" y="259" width="8" height="8" rx="1" fill="white" opacity="0.9"/>
  <!-- Person 3 (right) -->
  <circle cx="600" cy="175" r="55" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="1.5"/>
  <circle cx="600" cy="160" r="26" fill="url(#av3)"/>
  <ellipse cx="600" cy="200" rx="38" ry="22" fill="url(#av3)" opacity="0.8"/>
  <text x="600" y="167" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">PD</text>
