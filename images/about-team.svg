  <rect x="530" y="240" width="140" height="70" rx="12" fill="#112040" stroke="#1E6FFF" stroke-width="0.8"/>
  <rect x="545" y="255" width="65" height="7" rx="3.5" fill="white" opacity="0.85"/>
  <rect x="545" y="268" width="55" height="5" rx="2.5" fill="#5A6A8A"/>
  <rect x="545" y="281" width="85" height="5" rx="2.5" fill="#1E6FFF" opacity="0.7"/>
  <circle cx="643" cy="258" r="8" fill="#27C840" opacity="0.9"/>
  <!-- Bottom row: stats -->
  <rect x="60" y="390" width="680" height="130" rx="16" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="0.8"/>
