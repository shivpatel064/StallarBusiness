  <rect x="88" y="415" width="140" height="80" rx="10" fill="#112040"/>
  <text x="158" y="450" font-family="Arial" font-size="30" font-weight="bold" fill="#1E6FFF" text-anchor="middle">50+</text>
  <text x="158" y="468" font-family="Arial" font-size="11" fill="#5A6A8A" text-anchor="middle">Startup Clients</text>
  <rect x="248" y="415" width="140" height="80" rx="10" fill="#112040"/>
  <text x="318" y="450" font-family="Arial" font-size="30" font-weight="bold" fill="#00D4FF" text-anchor="middle">120+</text>
  <text x="318" y="468" font-family="Arial" font-size="11" fill="#5A6A8A" text-anchor="middle">Implementations</text>
  <rect x="408" y="415" width="140" height="80" rx="10" fill="#112040"/>
  <text x="478" y="450" font-family="Arial" font-size="30" font-weight="bold" fill="#1E6FFF" text-anchor="middle">95%</text>
  <text x="478" y="468" font-family="Arial" font-size="11" fill="#5A6A8A" text-anchor="middle">On-time Delivery</text>
  <rect x="568" y="415" width="144" height="80" rx="10" fill="#112040"/>
  <text x="640" y="450" font-family="Arial" font-size="30" font-weight="bold" fill="#00D4FF" text-anchor="middle">100%</text>
  <text x="640" y="468" font-family="Arial" font-size="11" fill="#5A6A8A" text-anchor="middle">Certified Team</text>
  <!-- Title text -->
  <text x="400" y="570" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">Salesforce-Certified Professionals</text>
  <text x="400" y="594" font-family="Arial" font-size="12" fill="#5A6A8A" text-anchor="middle">Building scalable CRM solutions for startups since 2020</text>
