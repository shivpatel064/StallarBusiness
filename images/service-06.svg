<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081228"/><stop offset="100%" stop-color="#0d1e3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E6FFF"/><stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.08" stroke="#1E6FFF" stroke-width="1">
    <line x1="0" y1="60" x2="600" y2="60"/><line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/><line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="60" y1="0" x2="60" y2="380"/><line x1="120" y1="0" x2="120" y2="380"/>
    <line x1="180" y1="0" x2="180" y2="380"/><line x1="240" y1="0" x2="240" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/><line x1="360" y1="0" x2="360" y2="380"/>
    <line x1="420" y1="0" x2="420" y2="380"/><line x1="480" y1="0" x2="480" y2="380"/>
    <line x1="540" y1="0" x2="540" y2="380"/>
  </g>
  <!-- Accent glow -->
  <ellipse cx="300" cy="190" rx="200" ry="160" fill="#00D4FF" opacity="0.15"/>
  <!-- Central icon circle -->
  <circle cx="300" cy="160" r="80" fill="rgba(30,111,255,0.12)" stroke="#1E6FFF" stroke-width="1"/>
  <circle cx="300" cy="160" r="60" fill="rgba(30,111,255,0.15)" stroke="#1E6FFF" stroke-width="0.5"/>
  
  <!-- Book -->
  <rect x="262" y="128" width="76" height="60" rx="6" fill="none" stroke="#1E6FFF" stroke-width="2.5"/>
  <line x1="300" y1="128" x2="300" y2="188" stroke="#1E6FFF" stroke-width="1.5"/>
  <rect x="268" y="138" width="26" height="5" rx="2.5" fill="#1E6FFF" opacity="0.6"/>
  <rect x="268" y="149" width="26" height="5" rx="2.5" fill="#1E6FFF" opacity="0.4"/>
  <rect x="268" y="160" width="20" height="5" rx="2.5" fill="#1E6FFF" opacity="0.3"/>
  <rect x="306" y="138" width="26" height="5" rx="2.5" fill="#00D4FF" opacity="0.6"/>
  <rect x="306" y="149" width="22" height="5" rx="2.5" fill="#00D4FF" opacity="0.4"/>
  <rect x="306" y="160" width="18" height="5" rx="2.5" fill="#00D4FF" opacity="0.3"/>
  <!-- Grad cap -->
  <polygon points="300,100 330,113 300,126 270,113" fill="#1E6FFF"/>
  <line x1="330" y1="113" x2="330" y2="128" stroke="#1E6FFF" stroke-width="2"/>
  <circle cx="330" cy="130" r="4" fill="#00D4FF"/>

  <!-- Label -->
  <rect x="180" y="268" width="240" height="36" rx="18" fill="url(#accent)"/>
  <text x="300" y="291" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Training & Support</text>
  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="4" fill="#1E6FFF" opacity="0.5"/>
  <circle cx="520" cy="80" r="4" fill="#00D4FF" opacity="0.5"/>
  <circle cx="80" cy="300" r="4" fill="#00D4FF" opacity="0.5"/>
  <circle cx="520" cy="300" r="4" fill="#1E6FFF" opacity="0.5"/>
</svg>