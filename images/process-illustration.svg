<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/><stop offset="100%" stop-color="#0d1e3d"/>
    </linearGradient>
    <linearGradient id="bl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E6FFF"/><stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.06" stroke="#1E6FFF" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="420"/><line x1="160" y1="0" x2="160" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/><line x1="320" y1="0" x2="320" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/><line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="560" y1="0" x2="560" y2="420"/><line x1="640" y1="0" x2="640" y2="420"/>
    <line x1="720" y1="0" x2="720" y2="420"/>
  </g>
  <!-- Connecting dashed line -->
  <line x1="100" y1="175" x2="700" y2="175" stroke="#1E6FFF" stroke-width="2" stroke-dasharray="8 6" opacity="0.4"/>
  <!-- Step 1 -->
  <circle cx="100" cy="175" r="40" fill="#112040" stroke="url(#bl)" stroke-width="2.5"/>
  <text x="100" y="183" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">01</text>
  <rect x="50" y="230" width="100" height="50" rx="10" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="0.5"/>
  <text x="100" y="252" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Discovery</text>
  <text x="100" y="268" font-family="Arial" font-size="9" fill="#5A6A8A" text-anchor="middle">30-min call</text>
  <!-- Step 2 -->
  <circle cx="300" cy="175" r="40" fill="#112040" stroke="url(#bl)" stroke-width="2.5"/>
  <text x="300" y="183" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">02</text>
  <rect x="248" y="230" width="104" height="50" rx="10" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="0.5"/>
  <text x="300" y="252" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Blueprint</text>
  <text x="300" y="268" font-family="Arial" font-size="9" fill="#5A6A8A" text-anchor="middle">Solution design</text>
  <!-- Step 3 -->
  <circle cx="500" cy="175" r="44" fill="#1E6FFF"/>
  <text x="500" y="183" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">03</text>
  <rect x="448" y="234" width="104" height="50" rx="10" fill="#1E6FFF" opacity="0.15" stroke="#1E6FFF" stroke-width="1"/>
  <text x="500" y="256" font-family="Arial" font-size="11" font-weight="bold" fill="#1E6FFF" text-anchor="middle">Agile Build</text>
  <text x="500" y="272" font-family="Arial" font-size="9" fill="#5A6A8A" text-anchor="middle">Sprint delivery</text>
  <!-- Step 4 -->
  <circle cx="700" cy="175" r="40" fill="#112040" stroke="url(#bl)" stroke-width="2.5"/>
  <text x="700" y="183" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle">04</text>
  <rect x="648" y="230" width="104" height="50" rx="10" fill="#0d1e3d" stroke="#1E6FFF" stroke-width="0.5"/>
  <text x="700" y="252" font-family="Arial" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Handoff</text>
  <text x="700" y="268" font-family="Arial" font-size="9" fill="#5A6A8A" text-anchor="middle">Train &amp; support</text>
  <!-- Time labels -->
  <rect x="55" y="80" width="90" height="22" rx="11" fill="rgba(30,111,255,0.15)" stroke="#1E6FFF" stroke-width="0.5"/>
  <text x="100" y="95" font-family="Arial" font-size="9" fill="#1E6FFF" text-anchor="middle">Day 1</text>
  <rect x="255" y="80" width="90" height="22" rx="11" fill="rgba(30,111,255,0.15)" stroke="#1E6FFF" stroke-width="0.5"/>
  <text x="300" y="95" font-family="Arial" font-size="9" fill="#1E6FFF" text-anchor="middle">Day 3–5</text>
  <rect x="452" y="80" width="96" height="22" rx="11" fill="#1E6FFF"/>
  <text x="500" y="95" font-family="Arial" font-size="9" fill="white" text-anchor="middle">Week 2–4</text>
  <rect x="655" y="80" width="90" height="22" rx="11" fill="rgba(30,111,255,0.15)" stroke="#1E6FFF" stroke-width="0.5"/>
  <text x="700" y="95" font-family="Arial" font-size="9" fill="#1E6FFF" text-anchor="middle">Go-Live!</text>
  <!-- Arrow heads -->
  <polygon points="188,171 202,175 188,179" fill="#1E6FFF" opacity="0.6"/>
  <polygon points="388,171 402,175 388,179" fill="#1E6FFF" opacity="0.6"/>
  <polygon points="588,171 602,175 588,179" fill="#1E6FFF" opacity="0.6"/>
  <!-- Bottom label -->
  <text x="400" y="360" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">From kickoff to go-live in under 4 weeks</text>
  <text x="400" y="382" font-family="Arial" font-size="11" fill="#5A6A8A" text-anchor="middle">Sprint-based delivery keeps you in control at every stage</text>
</svg>