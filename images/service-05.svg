<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081228"/><stop offset="100%" stop-color="#0a1830"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E6FFF"/><stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.08" stroke="#1E6FFF" stroke-width="1">
    <line x1="0" y1="60" x2="600" y2="60"/><line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/><line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="60" y1="0" x2="60" y2="380"/><line x1="120" y1="0" x2="120" y2="380"/>
    <line x1="180" y1="0" x2="180" y2="380"/><line x1="240" y1="0" x2="240" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/><line x1="360" y1="0" x2="360" y2="380"/>
    <line x1="420" y1="0" x2="420" y2="380"/><line x1="480" y1="0" x2="480" y2="380"/>
    <line x1="540" y1="0" x2="540" y2="380"/>
  </g>
  <!-- Accent glow -->
  <ellipse cx="300" cy="190" rx="200" ry="160" fill="#1E6FFF" opacity="0.15"/>
  <!-- Central icon circle -->
  <circle cx="300" cy="160" r="80" fill="rgba(30,111,255,0.12)" stroke="#1E6FFF" stroke-width="1"/>
  <circle cx="300" cy="160" r="60" fill="rgba(30,111,255,0.15)" stroke="#1E6FFF" stroke-width="0.5"/>
  
  <!-- Palette / design -->
  <rect x="262" y="128" width="76" height="64" rx="10" fill="none" stroke="#1E6FFF" stroke-width="2.5"/>
  <rect x="272" y="138" width="56" height="8" rx="4" fill="#1E6FFF" opacity="0.7"/>
  <rect x="272" y="152" width="40" height="6" rx="3" fill="#00D4FF" opacity="0.6"/>
  <rect x="272" y="164" width="50" height="6" rx="3" fill="#1E6FFF" opacity="0.5"/>
  <rect x="272" y="176" width="30" height="6" rx="3" fill="#4D8FFF" opacity="0.5"/>
  <!-- Pen cursor -->
  <polygon points="338,120 350,108 355,115 343,127" fill="#1E6FFF"/>
  <line x1="338" y1="120" x2="343" y2="127" stroke="#00D4FF" stroke-width="1.5"/>
  <!-- Color dots -->
  <circle cx="260" cy="208" r="8" fill="#1E6FFF"/>
  <circle cx="278" cy="208" r="8" fill="#00D4FF"/>
  <circle cx="296" cy="208" r="8" fill="#4D8FFF"/>
  <circle cx="314" cy="208" r="8" fill="white" opacity="0.4"/>
  <circle cx="332" cy="208" r="8" fill="#27C840" opacity="0.7"/>

  <!-- Label -->
  <rect x="180" y="268" width="240" height="36" rx="18" fill="url(#accent)"/>
  <text x="300" y="291" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">UI Customization</text>
  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="4" fill="#1E6FFF" opacity="0.5"/>
  <circle cx="520" cy="80" r="4" fill="#00D4FF" opacity="0.5"/>
  <circle cx="80" cy="300" r="4" fill="#00D4FF" opacity="0.5"/>
  <circle cx="520" cy="300" r="4" fill="#1E6FFF" opacity="0.5"/>
</svg>